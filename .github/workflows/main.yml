name: Project Phoenix CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Phase 1 - Linting & Type Checking
        run: npm run build

      - name: Phase 2 - Unit Tests
        run: npm run test

      - name: Phase 3 - Mock Security Scan
        run: npm audit --audit-level=high

      - name: Deploy to GCP Cloud Run
        run: echo "All phases passed!"